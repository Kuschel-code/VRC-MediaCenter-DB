name: Update AniWorld Database

on:
  schedule:
    # Jeden Tag um 03:00 Uhr UTC (05:00 Uhr MEZ)
    - cron: "0 3 * * *"
  # Manuell ausfuehrbar ueber GitHub-UI
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # max 3 Stunden (fuer alle 2350 Animes)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install httpx beautifulsoup4 lxml cachetools cloudscraper

      - name: Run scraper
        run: python update_library.py
        env:
          # Verhindert interaktive Git-Eingabeaufforderungen
          GIT_AUTHOR_NAME: "GitHub Actions Bot"
          GIT_AUTHOR_EMAIL: "actions@github.com"
          GIT_COMMITTER_NAME: "GitHub Actions Bot"
          GIT_COMMITTER_EMAIL: "actions@github.com"

      - name: Commit and push updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add anime.txt episodes.txt streams.txt movies.txt
          # Nur committen wenn es Aenderungen gibt
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
